<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title">
  <title id="title">What the Matrix Metabolizes</title>
  <defs>
    <radialGradient id="bg" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#17242e"/>
      <stop offset="1" stop-color="#05080c"/>
    </radialGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00d4ff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g stroke="#00d4ff" stroke-width="0.6" opacity="0.35" fill="none">
    <circle cx="800" cy="450" r="120"/>
    <circle cx="800" cy="450" r="220"/>
