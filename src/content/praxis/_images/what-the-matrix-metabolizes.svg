    <line x1="0" y1="600" x2="1600" y2="600" stroke="url(#seam)" stroke-width="0.8"/>
  </g>
  <g transform="translate(120,420)" font-family="Orbitron,sans-serif" fill="#bfa364" opacity="0.85">
