<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a2e3c" />
    <meta name="description" content="Universal Contextual Intelligence Matrix — Sarif Consulting" />
    <title>UCIM — Sarif Consulting</title>
    <script>
      try {
        var embed = new URLSearchParams(location.search).get('embed') === '1';
        if (embed) {
          document.documentElement.classList.add('ucim-embed');
        } else {
          /* Standalone UCIM: inject Space Grotesk (parent site already provides it when embedded). */
          var preconnect1 = document.createElement('link');
          preconnect1.rel = 'preconnect';
          preconnect1.href = 'https://fonts.googleapis.com';
          document.head.appendChild(preconnect1);
          var preconnect2 = document.createElement('link');
          preconnect2.rel = 'preconnect';
          preconnect2.href = 'https://fonts.gstatic.com';
          preconnect2.crossOrigin = '';
          document.head.appendChild(preconnect2);
          var fontLink = document.createElement('link');
          fontLink.rel = 'stylesheet';
          fontLink.href = 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap';
          document.head.appendChild(fontLink);
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to view this visualization.</noscript>
    <div id="root"></div>
  </body>
</html>
